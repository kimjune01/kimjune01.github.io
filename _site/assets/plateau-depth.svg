<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 276" font-family="system-ui, sans-serif">
  <style>
    .box { fill: #fff; stroke: #999; stroke-width: 1; rx: 4; }
    .con { fill: #f8f8f8; stroke: #999; stroke-width: 1; rx: 6; }
    .con1 { fill: #f4f4f4; stroke: #aaa; stroke-width: 1; rx: 6; }
    .name { text-anchor: middle; dominant-baseline: central; font-weight: 500; font-size: 13px; }
    .sub { text-anchor: middle; dominant-baseline: central; font-weight: 500; font-size: 11px; }
    .dim { fill: #aaa; }
    .clabel { font-size: 11px; fill: #999; font-weight: 500; }
    .arr { stroke: #bbb; stroke-width: 1.2; fill: none; marker-end: url(#a); }
    .pass { fill: none; stroke: #ccc; stroke-width: 1; stroke-dasharray: 4,3; rx: 4; }
  </style>
  <defs>
    <marker id="a" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5" fill="#bbb"/></marker>
  </defs>

  <!-- Level 0: Perceive → Filter → Attend → Remember, then down to Consolidate -->
  <rect class="box" x="20" y="8" width="74" height="32"/>
  <text class="name" x="57" y="24">Perceive</text>
  <line class="arr" x1="94" y1="24" x2="108" y2="24"/>

  <rect class="box" x="108" y="8" width="56" height="32"/>
  <text class="name" x="136" y="24">Filter</text>
  <line class="arr" x1="164" y1="24" x2="178" y2="24"/>

  <rect class="box" x="178" y="8" width="62" height="32"/>
  <text class="name" x="209" y="24">Attend</text>
  <line class="arr" x1="240" y1="24" x2="254" y2="24"/>

  <rect class="box" x="254" y="8" width="82" height="32"/>
  <text class="name" x="295" y="24">Remember</text>
  <line class="arr" x1="295" y1="40" x2="295" y2="58"/>

  <!-- Consolidate₀ container -->
  <rect class="con" x="16" y="60" width="380" height="208"/>
  <text class="clabel" x="30" y="76">Consolidate</text>

  <!-- Level 1: Perceive₁ → Filter₁ → Attend₁ → Remember₁, then down -->
  <rect class="box" x="30" y="90" width="66" height="28"/>
  <text class="sub" x="63" y="104">Perceive₁</text>
  <line class="arr" x1="96" y1="104" x2="108" y2="104"/>

  <rect class="box" x="108" y="90" width="50" height="28"/>
  <text class="sub" x="133" y="104">Filter₁</text>
  <line class="arr" x1="158" y1="104" x2="170" y2="104"/>

  <rect class="box" x="170" y="90" width="56" height="28"/>
  <text class="sub" x="198" y="104">Attend₁</text>
  <line class="arr" x1="226" y1="104" x2="238" y2="104"/>

  <rect class="box" x="238" y="90" width="74" height="28"/>
  <text class="sub" x="275" y="104">Remember₁</text>
  <line class="arr" x1="275" y1="118" x2="275" y2="136"/>

  <!-- Consolidate₁ container (inside Consolidate₀) -->
  <rect class="con1" x="30" y="138" width="350" height="118"/>
  <text class="clabel" x="44" y="154">Consolidate₁</text>

  <!-- Level 2: Perceive₂ → Filter₂ → Attend₂ → Remember₂, dimmed -->
  <rect class="box" x="44" y="168" width="58" height="24"/>
  <text class="sub dim" x="73" y="180">Perceive₂</text>
  <line class="arr" x1="102" y1="180" x2="114" y2="180"/>

  <rect class="box" x="114" y="168" width="46" height="24"/>
  <text class="sub dim" x="137" y="180">Filter₂</text>
  <line class="arr" x1="160" y1="180" x2="172" y2="180"/>

  <rect class="box" x="172" y="168" width="50" height="24"/>
  <text class="sub dim" x="197" y="180">Attend₂</text>
  <line class="arr" x1="222" y1="180" x2="234" y2="180"/>

  <rect class="box" x="234" y="168" width="66" height="24"/>
  <text class="sub dim" x="267" y="180">Remember₂</text>
  <line class="arr" x1="267" y1="192" x2="267" y2="210"/>

  <!-- Passthrough (bottom, dashed) -->
  <rect class="pass" x="210" y="212" width="106" height="24"/>
  <text class="sub dim" x="263" y="224">passthrough</text>
</svg>
