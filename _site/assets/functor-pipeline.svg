<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 276" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .title { font-weight: 700; font-size: 15px; text-anchor: middle; letter-spacing: 0.02em; }
    .node { stroke: #555; stroke-width: 1.5; fill: #fff; }
    .node-start { fill: #bbb; stroke: #999; stroke-width: 1; }
    .node-text { text-anchor: middle; dominant-baseline: central; font-weight: 700; font-size: 14px; fill: #333; }
    .arrow { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .step-label { text-anchor: middle; font-size: 12px; fill: #333; font-weight: 600; }
    .functor { stroke: #555; stroke-width: 1.5; fill: none; stroke-dasharray: 7,5; marker-end: url(#ahf); }
    .functor-label { text-anchor: middle; font-size: 12px; fill: #555; font-style: italic; font-weight: 500; }
    .group { stroke: none; rx: 12; }
  </style>
  <defs>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#888"/>
    </marker>
    <marker id="ahf" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- COGNITION row -->
  <text class="title" x="480" y="18">COGNITION — object type: Moment</text>
  <rect class="group" x="20" y="28" width="840" height="68" fill="#d4e4f7"/>

  <circle class="node-start" cx="55" cy="62" r="11"/>
  <line class="arrow" x1="66" y1="62" x2="152" y2="62"/>
  <text class="step-label" x="109" y="50">Perceive</text>

  <circle class="node" cx="170" cy="62" r="18"/>
  <text class="node-text" x="170" y="62">M</text>
  <line class="arrow" x1="188" y1="62" x2="282" y2="62"/>
  <text class="step-label" x="235" y="50">Cache</text>

  <circle class="node" cx="300" cy="62" r="18"/>
  <text class="node-text" x="300" y="62">M</text>
  <line class="arrow" x1="318" y1="62" x2="412" y2="62"/>
  <text class="step-label" x="365" y="50">Filter</text>

  <circle class="node" cx="430" cy="62" r="18"/>
  <text class="node-text" x="430" y="62">M</text>
  <line class="arrow" x1="448" y1="62" x2="542" y2="62"/>
  <text class="step-label" x="495" y="50">Attend</text>

  <circle class="node" cx="560" cy="62" r="18"/>
  <text class="node-text" x="560" y="62">M</text>
  <line class="arrow" x1="578" y1="62" x2="672" y2="62"/>
  <text class="step-label" x="625" y="50">Consolidate</text>

  <circle class="node" cx="690" cy="62" r="18"/>
  <text class="node-text" x="690" y="62">M</text>
  <line class="arrow" x1="708" y1="62" x2="802" y2="62"/>
  <text class="step-label" x="755" y="50">Remember</text>

  <circle class="node" cx="820" cy="62" r="18"/>
  <text class="node-text" x="820" y="62">M</text>

  <!-- Functor connector (right-angle path) -->
  <path class="functor" d="M820,80 L820,134 L55,134 L55,193"/>
  <text class="functor-label" x="438" y="126">Functor: Remember → Perceive</text>

  <!-- WRITING row -->
  <text class="title" x="480" y="172">WRITING — object type: Draft</text>
  <rect class="group" x="20" y="182" width="840" height="68" fill="#d4edd4"/>

  <circle class="node-start" cx="55" cy="216" r="11"/>
  <line class="arrow" x1="66" y1="216" x2="152" y2="216"/>
  <text class="step-label" x="109" y="204">Perceive</text>

  <circle class="node" cx="170" cy="216" r="18"/>
  <text class="node-text" x="170" y="216">D</text>
  <line class="arrow" x1="188" y1="216" x2="282" y2="216"/>
  <text class="step-label" x="235" y="204">Cache</text>

  <circle class="node" cx="300" cy="216" r="18"/>
  <text class="node-text" x="300" y="216">D</text>
  <line class="arrow" x1="318" y1="216" x2="412" y2="216"/>
  <text class="step-label" x="365" y="204">Filter</text>

  <circle class="node" cx="430" cy="216" r="18"/>
  <text class="node-text" x="430" y="216">D</text>
  <line class="arrow" x1="448" y1="216" x2="542" y2="216"/>
  <text class="step-label" x="495" y="204">Attend</text>

  <circle class="node" cx="560" cy="216" r="18"/>
  <text class="node-text" x="560" y="216">D</text>
  <line class="arrow" x1="578" y1="216" x2="672" y2="216"/>
  <text class="step-label" x="625" y="204">Consolidate</text>

  <circle class="node" cx="690" cy="216" r="18"/>
  <text class="node-text" x="690" y="216">D</text>
  <line class="arrow" x1="708" y1="216" x2="802" y2="216"/>
  <text class="step-label" x="755" y="204">Remember</text>

  <circle class="node" cx="820" cy="216" r="18"/>
  <text class="node-text" x="820" y="216">D</text>
</svg>
