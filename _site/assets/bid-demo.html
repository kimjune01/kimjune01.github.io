<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#fff;display:flex;flex-direction:column;align-items:center;padding:8px 8px 0}
svg{width:100%;max-width:600px;display:block}
.controls{width:90%;max-width:540px;margin-top:4px}
input[type=range]{width:100%;margin:4px 0}
.readout{padding:8px 12px;background:#f5f5f5;border-radius:6px;font-size:14px;line-height:1.6;margin-top:6px}
</style>
</head>
<body>
<svg id="chart" viewBox="0 0 600 260">
  <defs>
    <linearGradient id="gA" x1="0" x2="1"><stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/></linearGradient>
    <linearGradient id="gB" x1="1" x2="0"><stop offset="0%" stop-color="#f97316" stop-opacity="0.2"/><stop offset="100%" stop-color="#f97316" stop-opacity="0"/></linearGradient>
  </defs>
  <rect x="40" y="20" width="520" height="200" fill="url(#gA)"/>
  <rect x="40" y="20" width="520" height="200" fill="url(#gB)"/>
  <line x1="40" y1="220" x2="560" y2="220" stroke="#888" stroke-width="1"/>
  <text x="300" y="248" text-anchor="middle" font-size="12" fill="#888">embedding space</text>
  <polyline id="curveA" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round"/>
  <polyline id="curveB" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linejoin="round"/>
  <text id="labelA" text-anchor="middle" font-size="12" fill="#3b82f6" font-weight="bold"></text>
  <text id="labelB" text-anchor="middle" font-size="12" fill="#f97316" font-weight="bold"></text>
  <line id="qLine" y1="20" y2="220" stroke="#333" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
  <circle id="qDot" r="5" cy="220" fill="#333"/>
</svg>
<div class="controls">
  <input type="range" id="qSlider" min="40" max="560" value="220" step="1">
  <div class="readout" id="readout"></div>
</div>
<script>
(function(){
  var X0=40,X1=560,Y0=20,Y1=220,H=Y1-Y0;
  var cA=220,cB=380,bA=8,bB=5,sigA=0.30,sigB=0.55;
  var spA=sigA*520,spB=sigB*520;

  function gauss(x,cx,sp){return Math.exp(-((x-cx)*(x-cx))/(2*sp*sp));}

  function makeCurve(cx,b,sp){
    var pts=[];
    for(var x=X0;x<=X1;x+=2){
      var v=b*gauss(x,cx,sp);
      var y=Y1-(v/10)*H;
      pts.push(x+','+Math.max(Y0,Math.min(Y1,y)).toFixed(1));
    }
    return pts.join(' ');
  }

  var curveA=document.getElementById('curveA');
  var curveB=document.getElementById('curveB');
  var labelA=document.getElementById('labelA');
  var labelB=document.getElementById('labelB');
  var qLine=document.getElementById('qLine');
  var qDot=document.getElementById('qDot');
  var slider=document.getElementById('qSlider');
  var readout=document.getElementById('readout');

  // draw static curves
  curveA.setAttribute('points',makeCurve(cA,bA,spA));
  curveB.setAttribute('points',makeCurve(cB,bB,spB));

  var peakA=Y1-(bA/10)*H;
  var peakB=Y1-(bB/10)*H;
  labelA.setAttribute('x',cA);
  labelA.setAttribute('y',Math.max(Y0+14,peakA-10));
  labelA.textContent='Climbing PT · $'+bA+' · \u03C3 '+sigA.toFixed(2);
  labelB.setAttribute('x',cB);
  labelB.setAttribute('y',Math.max(Y0+14,peakB-10));
  labelB.textContent='Sports PT · $'+bB+' · \u03C3 '+sigB.toFixed(2);

  function update(){
    var qx=+slider.value;
    qLine.setAttribute('x1',qx);
    qLine.setAttribute('x2',qx);
    qDot.setAttribute('cx',qx);

    var valA=bA*gauss(qx,cA,spA);
    var valB=bB*gauss(qx,cB,spB);
    var aWins=valA>=valB;
    var color=aWins?'#3b82f6':'#f97316';
    var winner=aWins?'Climbing PT':'Sports PT';
    var payment=aWins?valB:valA;

    var dotY=Y1-(payment/10)*H;
    qDot.setAttribute('cy',Math.max(Y0,Math.min(Y1,dotY)));
    qDot.setAttribute('fill',color);
    qLine.setAttribute('stroke',color);

    var winVal=aWins?valA:valB;
    readout.innerHTML=
      '<span style="color:'+color+';font-weight:bold">'+winner+'</span> wins'+
      '<span style="float:right">bid <b>$'+winVal.toFixed(2)+'</b> · pays <b>$'+payment.toFixed(2)+'</b></span>';
  }

  slider.addEventListener('input',update);
  update();
})();
</script>
</body>
</html>
