<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 340" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#999" stroke-width="1.2"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#2e7d32" stroke-width="1.2"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#e65100" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Phase labels -->
  <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">INPUTS</text>
  <text x="440" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">IMPLEMENT</text>
  <text x="770" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#999" letter-spacing="0.1em">SYNTHESIZE</text>

  <!-- Phase dividers -->
  <line x1="275" y1="12" x2="275" y2="330" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="615" y1="12" x2="615" y2="330" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- INPUTS -->
  <rect x="15" y="42" width="230" height="48" rx="7" fill="#bbdefb" stroke="#90caf9" stroke-width="1"/>
  <text x="130" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Ground Truth</text>
  <text x="130" y="79" text-anchor="middle" font-size="10" fill="#555" font-style="italic">existing source + tests</text>

  <rect x="15" y="102" width="230" height="48" rx="7" fill="#d4e4f7" stroke="#a8c8e8" stroke-width="1"/>
  <text x="130" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Prose Spec</text>
  <text x="130" y="139" text-anchor="middle" font-size="10" fill="#555" font-style="italic">the hypothesis</text>

  <rect x="15" y="162" width="230" height="48" rx="7" fill="#e8d5f5" stroke="#ce93d8" stroke-width="1"/>
  <text x="130" y="182" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Prototype</text>
  <text x="130" y="199" text-anchor="middle" font-size="10" fill="#555" font-style="italic">existence proof</text>

  <rect x="15" y="228" width="230" height="48" rx="7" fill="#ffe0b2" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="130" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Authority Rule</text>
  <text x="130" y="265" text-anchor="middle" font-size="10" fill="#555" font-style="italic">no regressions, UX improvement</text>

  <!-- IMPLEMENT -->
  <rect x="320" y="52" width="230" height="64" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="435" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Coding Agent A</text>
  <text x="435" y="91" text-anchor="middle" font-size="10" fill="#555">blind implementation</text>
  <text x="435" y="106" text-anchor="middle" font-size="10" fill="#999" font-style="italic">architecture + config</text>

  <rect x="320" y="132" width="230" height="64" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="435" y="154" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Coding Agent B</text>
  <text x="435" y="171" text-anchor="middle" font-size="10" fill="#555">blind implementation</text>
  <text x="435" y="186" text-anchor="middle" font-size="10" fill="#999" font-style="italic">defensive patterns + types</text>

  <rect x="320" y="228" width="230" height="48" rx="7" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="435" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Cross-Review</text>
  <text x="435" y="265" text-anchor="middle" font-size="10" fill="#555" font-style="italic">compare, find contradictions</text>

  <!-- SYNTHESIZE -->
  <rect x="660" y="82" width="220" height="64" rx="7" fill="#c8e6c9" stroke="#81c784" stroke-width="1.5"/>
  <text x="770" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Synthesis</text>
  <text x="770" y="123" text-anchor="middle" font-size="10" fill="#555">absorb best of both</text>
  <text x="770" y="138" text-anchor="middle" font-size="10" fill="#2e7d32" font-style="italic">closest to production</text>

  <rect x="660" y="178" width="220" height="48" rx="7" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="770" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Fresh Judge</text>
  <text x="770" y="215" text-anchor="middle" font-size="10" fill="#555" font-style="italic">blind review of all four</text>

  <!-- ARROWS: inputs → Coding Agent A -->
  <line x1="245" y1="66" x2="315" y2="72" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="245" y1="121" x2="315" y2="90" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="245" y1="181" x2="315" y2="105" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ARROWS: inputs → Coding Agent B -->
  <line x1="245" y1="72" x2="315" y2="148" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="245" y1="131" x2="315" y2="160" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="245" y1="191" x2="315" y2="172" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Authority rule → both agents (curved, orange dashed) -->
  <path d="M245,248 C290,248 300,100 315,84" fill="none" stroke="#e65100" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-o)"/>
  <path d="M245,256 C290,256 300,185 315,164" fill="none" stroke="#e65100" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-o)"/>

  <!-- Agents → cross-review -->
  <line x1="435" y1="116" x2="435" y2="223" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="435" y1="196" x2="435" y2="223" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Cross-review → synthesis (green, strong) -->
  <path d="M550,252 C590,252 630,140 655,114" fill="none" stroke="#2e7d32" stroke-width="1.8" marker-end="url(#arr-g)"/>

  <!-- Synthesis → judge -->
  <line x1="770" y1="146" x2="770" y2="173" stroke="#999" stroke-width="1.2" marker-end="url(#arr)"/>
</svg>
