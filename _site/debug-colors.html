er" /></p><p>Usage:</p><figure class="highlight"><pre><code class="language-swift" data-lang="swift"><span class="k">override</span> <span class="kd">func</span> <span class="nf">viewDidAppear</span><span class="p">(</span><span class="nv">animated</span><span class="p">:</span> <span class="kt">Bool</span><span class="p">)</span> <span class="p">{</span>
  <span class="k">super</span><span class="o">.</span><span class="nf">viewDidAppear</span><span class="p">(</span><span class="n">animated</span><span class="p">)</span>
  <span class="nf">debugColors</span><span class="p">()</span>
<span class="p">}</span></code></pre></figure><figure class="highlight"><pre><code class="language-swift" data-lang="swift"><span class="kd">func</span> <span class="nf">layoutSubviews</span><span class="p">()</span> <span class="p">{</span>
  <span class="k">super</span><span class="o">.</span><span class="nf">layoutSubviews</span><span class="p">()</span>
  <span class="nf">debugColors</span><span class="p">()</span>
<span class="p">}</span></code></pre></figure><p>Implementation:</p><figure class="highlight"><pre><code class="language-swift" data-lang="swift"><span class="kd">extension</span> <span class="kt">UIView</span> <span class="p">{</span>
  <span class="kd">func</span> <span class="nf">debugColors</span><span class="p">()</span> <span class="p">{</span>
    <span class="kd">func</span> <span class="nf">randomColor</span><span class="p">()</span> <span class="o">-&gt;</span> <span class="kt">UIColor</span> <span class="p">{</span>
      <span class="kd">func</span> <span class="nf">randomCGFloat</span><span class="p">()</span> <span class="o">-&gt;</span> <span class="kt">CGFloat</span> <span class="p">{</span>
        <span class="k">return</span> <span class="kt">CGFloat</span><span class="p">(</span><span class="nf">arc4random</span><span class="p">())</span> <span class="o">/</span> <span class="kt">CGFloat</span><span class="p">(</span><span class="kt">UInt32</span><span class="o">.</span><span class="n">max</span><span class="p">)</span>
      <span class="p">}</span>
      <span class="k">return</span> <span class="kt">UIColor</span><span class="p">(</span>
        <span class="nv">red</span><span class="p">:</span> <span class="nf">randomCGFloat</span><span class="p">(),</span>
        <span class="nv">green</span><span class="p">:</span> <span class="nf">randomCGFloat</span><span class="p">(),</span>
        <span class="nv">blue</span><span class="p">:</span> <span class="nf">randomCGFloat</span><span class="p">(),</span>
        <span class="nv">alpha</span><span class="p">:</span> <span class="mf">0.7</span><span class="p">)</span>
    <span class="p">}</span>
    
    <span class="k">for</span> <span class="n">eachSubview</span> <span class="k">in</span> <span class="n">subviews</span> <span class="p">{</span>
      <span class="n">eachSubview</span><span class="o">.</span><span class="n">backgroundColor</span> <span class="o">=</span> <span class="nf">randomColor</span><span class="p">()</span>
      <span class="n">eachSubview</span><span class="o">.</span><span class="nf">debugColors</span><span class="p">()</span>
    <span class="p">}</span>
  <span class="p">}</span>
<span class="p">}</span>

<span class="kd">extension</span> <span class="kt">UIViewController</span> <span class="p">{</span>
  <span class="kd">func</span> <span class="nf">debugColors</span><span class="p">()</span> <span class="p">{</span>
    <span class="n">view</span><span class="o">.</span><span class="nf">debugColors</span><span class="p">()</span>
  <span class="p">}</span>
<span class="p">}</span></code></pre></figure></article><a href="https://www.june.kim/feed.xml" class="rss-popup" id="rss-popup" title="Subscribe via RSS"> <i class="fa fa-rss"></i> </a><style> .rss-popup { position: fixed; bottom: 4px; left: 10px; background: #f26522; color: white; width: 44px; height: 44px; border-radius: 50%; text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); transform: translateY(60px); opacity: 0; transition: transform 0.4s ease, opacity 0.4s ease; z-index: 1000; } .rss-popup:hover { background: #d55a1b; color: white; } .rss-popup.visible { transform: translateY(0); opacity: 1; }</style><script> (function() { var popup = document.getElementById('rss-popup'); var hasShown = false; var timeoutId = null; function isAtBottom() { return (window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 100); } function showPopup() { if (!hasShown) { hasShown = true; popup.classList.add('visible'); } } window.addEventListener('scroll', function() { if (isAtBottom() && !hasShown) { if (!timeoutId) { timeoutId = setTimeout(showPopup, 2000); } } else if (!isAtBottom() && timeoutId && !hasShown) { clearTimeout(timeoutId); timeoutId = null; } }); })(); </script></main></body><footer class="edit-footer"> <a href= https://github.com/kimjune01/kimjune01.github.io/edit/master/_posts/2016/first-half/2016-02-06-debug-colors.md > edit </a> <span class="license"> <a rel="license" href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a> </span></footer></html>
