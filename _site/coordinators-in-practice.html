<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Coordinators in practice | June Kim</title><meta name="description" content="Navigation Coordinator: the superclass"><link rel="canonical" href="https://www.june.kim/coordinators-in-practice"><meta property="og:type" content="article" /><meta property="article:published_time" content="2016-11-22T00:00:00-08:00" /><meta property="article:author" content="June Kim" /><meta property="article:tag" content="coding" /><meta property="og:title" content="Coordinators in practice" /><meta property="og:url" content="https://www.june.kim/coordinators-in-practice" /><meta property="og:site_name" content="June Kim" /><meta property="og:description" content="Navigation Coordinator: the superclass" /><meta property="og:image" content="https://www.june.kim/assets/default-icon.png" /><meta name="twitter:card" content="summary" /><meta name="twitter:site" content="@kimjune01" /><meta name="twitter:title" content="Coordinators in practice" /><meta name="twitter:description" content="Navigation Coordinator: the superclass"><meta name="google-site-verification" content="KI4yEdescuJGYOwKudJNOWvsQzH5x2MZ05-CdCH_nm8"> <script type="application/ld+json"> { "@context": "https://schema.org", "@type": "BlogPosting", "headline": "Coordinators in practice", "description": "Navigation Coordinator: the superclass", "url": "https://www.june.kim/coordinators-in-practice", "datePublished": "2016-11-22T00:00:00-08:00", "dateModified": "2016-11-22T00:00:00-08:00", "author": { "@type": "Person", "name": "June Kim", "url": "https://www.june.kim" }, "publisher": { "@type": "Person", "name": "June Kim", "url": "https://www.june.kim" }, "license": "https://creativecommons.org/licenses/by-sa/4.0/", "mainEntityOfPage": { "@type": "WebPage", "@id": "https://www.june.kim/coordinators-in-practice" }, "keywords": "coding" } </script> <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8688229960293614" crossorigin="anonymous"></script><link rel="license" href="https://creativecommons.org/licenses/by-sa/4.0/"><link rel="icon" href="/images/favicon.png"><link rel="apple-touch-icon" href="/assets/touch-icon.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="//code.cdn.mozilla.net/fonts/fira.css"><link rel="stylesheet" href="/assets/core.css"><link rel="alternate" type="application/rss+xml" href="https://www.june.kim/feed.xml"><link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css"> <script type="text/javascript">window.$crisp=[];window.CRISP_WEBSITE_ID="44344d36-d395-4737-8eec-720a5bc86c4d";(function(){d=document;s=d.createElement("script");s.src="https://client.crisp.chat/l.js";s.async=1;d.getElementsByTagName("head")[0].appendChild(s);})();</script></head><body><aside class="logo"> <a href="/"> <img src="http://www.gravatar.com/avatar/a162fa4928ebc00907f6cc47727cbb6c.png?s=80" class="gravatar"> <!-- <svg class="open-to-work-ring" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg"> <defs><path id="otw-circle" d="M 133,75 A 58,58 0 1,0 17,75 A 58,58 0 1,0 133,75" fill="none" /> </defs> <text font-family="Avenir, sans-serif" font-size="11" fill="#000" fill-opacity="0.65" letter-spacing="2.5"> <textPath href="#otw-circle" startOffset="62.5%" text-anchor="middle">open to work</textPath> </text> </svg> --> </a> <span class="logo-prompt">Home</span></aside><main class="fade-shift"> <noscript><style> article .footnotes { display: block; }</style></noscript><article><div class="center"><h1>Coordinators in practice</h1></div><p>Navigation Coordinator: the superclass</p><figure class="highlight"><pre><code class="language-swift" data-lang="swift"><span class="c1">//</span>
<span class="c1">//  NavigationCoordinator.swift</span>
<span class="c1">//</span>

<span class="kd">import</span> <span class="kt">Foundation</span>
<span class="kd">import</span> <span class="kt">UIKit</span>

<span class="kd">protocol</span> <span class="kt">NavigationCoordinatorDelegate</span><span class="p">:</span> <span class="kd">class</span> <span class="p">{</span>
  <span class="kd">func</span> <span class="nf">rootwillAppear</span><span class="p">(</span><span class="n">_</span> <span class="nv">root</span><span class="p">:</span><span class="kt">UIViewController</span><span class="p">)</span>
  <span class="kd">func</span> <span class="nf">present</span><span class="p">(</span><span class="n">_</span> <span class="nv">vc</span><span class="p">:</span><span class="kt">UIViewController</span><span class="p">,</span> <span class="n">onto</span> <span class="nv">frame</span><span class="p">:</span><span class="kt">CGRect</span><span class="p">)</span>
  <span class="kd">func</span> <span class="nf">detailViewWillAppear</span><span class="p">()</span>
  <span class="kd">func</span> <span class="nf">masterViewWillAppear</span><span class="p">()</span>
<span class="p">}</span>

<span class="kd">class</span> <span class="kt">NavigationCoordinator</span> <span class="p">{</span>
  <span class="k">var</span> <span class="nv">nav</span><span class="p">:</span> <span class="kt">UINavigationController</span>
  <span class="k">weak</span> <span class="k">var</span> <span class="nv">delegate</span><span class="p">:</span> <span class="kt">NavigationCoordinatorDelegate</span><span class="p">?</span>
  <span class="k">var</span> <span class="nv">rootVC</span><span class="p">:</span> <span class="kt">UIViewController</span> <span class="p">{</span> <span class="k">return</span> <span class="n">nav</span><span class="o">.</span><span class="n">viewControllers</span><span class="o">.</span><span class="n">first</span><span class="o">!</span> <span class="p">}</span>
  
  <span class="nf">init</span><span class="p">(</span><span class="nv">vc</span><span class="p">:</span> <span class="kt">UIViewController</span><span class="p">)</span> <span class="p">{</span>
    <span class="k">self</span><span class="o">.</span><span class="n">nav</span> <span class="o">=</span> <span class="kt">UINavigationController</span><span class="p">(</span><span class="nv">rootViewController</span><span class="p">:</span><span class="n">vc</span><span class="p">)</span>
  <span class="p">}</span>
  <span class="kd">func</span> <span class="nf">popToRoot</span><span class="p">()</span> <span class="p">{</span>
    <span class="n">nav</span><span class="o">.</span><span class="nf">popToRootViewController</span><span class="p">(</span><span class="nv">animated</span><span class="p">:</span> <span class="kc">false</span><span class="p">)</span>
  <span class="p">}</span>
  <span class="kd">func</span> <span class="nf">push</span><span class="p">(</span><span class="n">_</span> <span class="nv">vc</span><span class="p">:</span> <span class="kt">UIViewController</span><span class="p">)</span> <span class="p">{</span>
    <span class="n">nav</span><span class="o">.</span><span class="nf">pushViewController</span><span class="p">(</span><span class="n">vc</span><span class="p">,</span> <span class="nv">animated</span><span class="p">:</span> <span class="kc">true</span><span class="p">)</span>
  <span class="p">}</span>
  <span class="kd">func</span> <span class="nf">hideNavBar</span><span class="p">()</span> <span class="p">{</span>
    <span class="n">nav</span><span class="o">.</span><span class="n">navigationBar</span><span class="o">.</span><span class="n">isHidden</span> <span class="o">=</span> <span class="kc">true</span>
  <span class="p">}</span>
  <span class="kd">func</span> <span class="nf">showNavBar</span><span class="p">()</span> <span class="p">{</span>
    <span class="n">nav</span><span class="o">.</span><span class="n">navigationBar</span><span class="o">.</span><span class="n">isHidden</span> <span class="o">=</span> <span class="kc">false</span>
  <span class="p">}</span>
  <span class="kd">func</span> <span class="nf">topDistance</span><span class="p">()</span> <span class="o">-&gt;</span> <span class="kt">CGFloat</span> <span class="p">{</span>
    <span class="k">return</span> <span class="n">nav</span><span class="o">.</span><span class="n">navigationBar</span><span class="o">.</span><span class="n">frame</span><span class="o">.</span><span class="n">size</span><span class="o">.</span><span class="n">height</span> <span class="o">+</span> <span class="kt">UIApplication</span><span class="o">.</span><span class="n">shared</span><span class="o">.</span><span class="n">statusBarFrame</span><span class="o">.</span><span class="n">height</span>
  <span class="p">}</span>
  
<span class="p">}</span></code></pre></figure><p>Main Coordinator: inherits, and specifies the flow</p><figure class="highlight"><pre><code class="language-swift" data-lang="swift"><span class="kd">protocol</span> <span class="kt">MainCoordinatorDelegate</span><span class="p">:</span> <span class="kt">NavigationCoordinatorDelegate</span> <span class="p">{</span>
  <span class="kd">func</span> <span class="nf">didDismissSettings</span><span class="p">()</span>
  <span class="kd">func</span> <span class="nf">settingsButtonTapped</span><span class="p">()</span>
<span class="p">}</span>

<span class="kd">class</span> <span class="kt">MainCoordinator</span><span class="p">:</span> <span class="kt">NavigationCoordinator</span> <span class="p">{</span>
  
  <span class="k">override</span> <span class="nf">init</span><span class="p">(</span><span class="nv">vc</span><span class="p">:</span> <span class="kt">UIViewController</span><span class="p">)</span> <span class="p">{</span>
    <span class="k">let</span> <span class="nv">mainVC</span> <span class="o">=</span> <span class="n">vc</span> <span class="k">as!</span> <span class="kt">MainVC</span>
    <span class="k">super</span><span class="o">.</span><span class="nf">init</span><span class="p">(</span><span class="nv">vc</span><span class="p">:</span><span class="n">mainVC</span><span class="p">)</span>
    <span class="n">mainVC</span><span class="o">.</span><span class="n">delegate</span> <span class="o">=</span> <span class="k">self</span>
  <span class="p">}</span>

<span class="p">}</span>

<span class="kd">extension</span> <span class="kt">MainCoordinator</span><span class="p">:</span> <span class="kt">MainVCDelegate</span> <span class="p">{</span>

  <span class="kd">func</span> <span class="nf">willAppear</span><span class="p">()</span> <span class="p">{</span>
    <span class="n">delegate</span><span class="p">?</span><span class="o">.</span><span class="nf">rootwillAppear</span><span class="p">(</span><span class="n">nav</span><span class="o">.</span><span class="n">viewControllers</span><span class="o">.</span><span class="n">first</span><span class="o">!</span><span class="p">)</span>
    <span class="n">nav</span><span class="o">.</span><span class="n">navigationBar</span><span class="o">.</span><span class="n">isHidden</span> <span class="o">=</span> <span class="kc">false</span>
  <span class="p">}</span>

  <span class="kd">func</span> <span class="nf">didTapSettingsButton</span><span class="p">()</span> <span class="p">{</span>
    <span class="p">(</span><span class="n">delegate</span> <span class="k">as?</span> <span class="kt">MainCoordinatorDelegate</span><span class="p">)</span><span class="o">.</span><span class="nf">settingsButtonTapped</span><span class="p">()</span>
    <span class="k">let</span> <span class="nv">settingsVC</span> <span class="o">=</span> <span class="kt">SettingsVC</span><span class="p">()</span>
    <span class="n">settingsVC</span><span class="o">.</span><span class="n">delegate</span> <span class="o">=</span> <span class="k">self</span>
    <span class="n">nav</span><span class="o">.</span><span class="nf">pushViewController</span><span class="p">(</span><span class="n">settingsVC</span><span class="p">,</span> <span class="nv">animated</span><span class="p">:</span> <span class="kc">true</span><span class="p">)</span>
  <span class="p">}</span>

<span class="p">}</span>  

<span class="kd">extension</span> <span class="kt">MainCoordinator</span><span class="p">:</span> <span class="kt">SettingsVCDelegate</span> <span class="p">{</span>
  <span class="c1">//TODO:</span>
<span class="p">}</span></code></pre></figure><p>Now MainVC and SettingsVC have no references to each other or to its parent view controllers. Hooray!</p><p><a href="http://khanlou.com/2015/10/coordinators-redux/">Thanks to Khanlou</a> <a href="https://vimeo.com/144116310">Video</a></p></article><a href="https://www.june.kim/feed.xml" class="rss-popup" id="rss-popup" title="Subscribe via RSS"> <i class="fa fa-rss"></i> </a><style> .rss-popup { position: fixed; bottom: 4px; left: 10px; background: #f26522; color: white; width: 44px; height: 44px; border-radius: 50%; text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); transform: translateY(60px); opacity: 0; transition: transform 0.4s ease, opacity 0.4s ease; z-index: 1000; } .rss-popup:hover { background: #d55a1b; color: white; } .rss-popup.visible { transform: translateY(0); opacity: 1; }</style><script> (function() { var popup = document.getElementById('rss-popup'); var hasShown = false; var timeoutId = null; function isAtBottom() { return (window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 100); } function showPopup() { if (!hasShown) { hasShown = true; popup.classList.add('visible'); } } window.addEventListener('scroll', function() { if (isAtBottom() && !hasShown) { if (!timeoutId) { timeoutId = setTimeout(showPopup, 2000); } } else if (!isAtBottom() && timeoutId && !hasShown) { clearTimeout(timeoutId); timeoutId = null; } }); })(); </script></main></body><footer class="edit-footer"> <a href= https://github.com/kimjune01/kimjune01.github.io/edit/master/_posts/2016/2016-11-22-coordinators-in-practice.md > edit </a> <span class="license"> <a rel="license" href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a> </span></footer></html>
