<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 276" font-family="system-ui, sans-serif">
  <style>
    .box { fill: #fff; stroke: #999; stroke-width: 1; rx: 4; }
    .con { fill: #f8f8f8; stroke: #999; stroke-width: 1; rx: 6; }
    .con1 { fill: #f4f4f4; stroke: #aaa; stroke-width: 1; rx: 6; }
    .name { text-anchor: middle; dominant-baseline: central; font-weight: 500; font-size: 13px; }
    .sub { text-anchor: middle; dominant-baseline: central; font-weight: 500; font-size: 11px; }
    .dim { fill: #aaa; }
    .clabel { font-size: 11px; fill: #999; font-weight: 500; }
    .arr { stroke: #bbb; stroke-width: 1.2; fill: none; marker-end: url(#a); }
    .zoom { stroke: #bbb; stroke-width: 1; fill: none; stroke-dasharray: 4,3; marker-end: url(#a); }
    .pass { fill: none; stroke: #ccc; stroke-width: 1; stroke-dasharray: 4,3; rx: 4; }
  </style>
  <defs>
    <marker id="a" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5" fill="#bbb"/></marker>
  </defs>

  <!-- Level 0 -->
  <rect class="box" x="20" y="8" width="74" height="32"/>
  <text class="name" x="57" y="24">Perceive</text>
  <line class="arr" x1="94" y1="24" x2="108" y2="24"/>

  <rect class="box" x="108" y="8" width="56" height="32"/>
  <text class="name" x="136" y="24">Cache</text>
  <line class="arr" x1="164" y1="24" x2="178" y2="24"/>

  <rect class="box" x="178" y="8" width="50" height="32"/>
  <text class="name" x="203" y="24">Filter</text>
  <line class="arr" x1="228" y1="24" x2="242" y2="24"/>

  <rect class="box" x="242" y="8" width="56" height="32"/>
  <text class="name" x="270" y="24">Attend</text>
  <line class="arr" x1="298" y1="24" x2="312" y2="24"/>

  <rect class="box" x="312" y="8" width="82" height="32"/>
  <text class="name" x="353" y="24">Remember</text>

  <!-- Dotted zoom arrow from Cache₀ down into container -->
  <path class="zoom" d="M136,40 L136,56 L26,56 L26,78"/>

  <!-- Cache₀ container -->
  <rect class="con" x="16" y="52" width="380" height="208"/>
  <text class="clabel" x="30" y="68">Cache contains:</text>

  <!-- Level 1 -->
  <rect class="box" x="30" y="82" width="66" height="28"/>
  <text class="sub" x="63" y="96">Perceive</text>
  <line class="arr" x1="96" y1="96" x2="108" y2="96"/>

  <rect class="box" x="108" y="82" width="50" height="28"/>
  <text class="sub" x="133" y="96">Cache</text>
  <line class="arr" x1="158" y1="96" x2="170" y2="96"/>

  <rect class="box" x="170" y="82" width="44" height="28"/>
  <text class="sub" x="192" y="96">Filter</text>
  <line class="arr" x1="214" y1="96" x2="226" y2="96"/>

  <rect class="box" x="226" y="82" width="50" height="28"/>
  <text class="sub dim" x="251" y="96">Attend</text>
  <line class="arr" x1="276" y1="96" x2="288" y2="96"/>

  <rect class="box" x="288" y="82" width="74" height="28"/>
  <text class="sub" x="325" y="96">Remember</text>

  <!-- Dotted zoom arrow from Cache₁ down into container -->
  <path class="zoom" d="M133,110 L133,126 L40,126 L40,150"/>

  <!-- Cache₁ container -->
  <rect class="con1" x="30" y="124" width="350" height="124"/>
  <text class="clabel" x="44" y="140">Cache contains:</text>

  <!-- Level 2 -->
  <rect class="box" x="44" y="154" width="58" height="24"/>
  <text class="sub" x="73" y="166">Perceive</text>
  <line class="arr" x1="102" y1="166" x2="114" y2="166"/>

  <rect class="box" x="114" y="154" width="46" height="24"/>
  <text class="sub" x="137" y="166">Cache</text>
  <line class="arr" x1="160" y1="166" x2="172" y2="166"/>

  <rect class="box" x="172" y="154" width="40" height="24"/>
  <text class="sub" x="192" y="166">Filter</text>
  <line class="arr" x1="212" y1="166" x2="224" y2="166"/>

  <rect class="box" x="224" y="154" width="46" height="24"/>
  <text class="sub dim" x="247" y="166">Attend</text>
  <line class="arr" x1="270" y1="166" x2="282" y2="166"/>

  <rect class="box" x="282" y="154" width="66" height="24"/>
  <text class="sub dim" x="315" y="166">Remember</text>

  <!-- Dotted zoom arrow from Cache₂ down to bool -->
  <path class="zoom" d="M137,178 L137,204"/>

  <!-- Bool store -->
  <rect class="pass" x="112" y="206" width="50" height="24"/>
  <text class="sub dim" x="137" y="218">0 | 1</text>

</svg>
