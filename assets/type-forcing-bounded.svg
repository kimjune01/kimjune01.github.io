<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" font-family="system-ui, sans-serif">
  <style>
    .box { fill: #fff; stroke: #999; stroke-width: 1; rx: 4; }
    .box-forced { fill: #e3f2fd; stroke: #1565c0; stroke-width: 1.5; rx: 4; }
    .box-empty { fill: #fafafa; stroke: #ddd; stroke-width: 1; rx: 4; stroke-dasharray: 4,3; }
    .name { text-anchor: middle; dominant-baseline: central; font-weight: 500; font-size: 12px; }
    .name-forced { text-anchor: middle; dominant-baseline: central; font-weight: 600; font-size: 12px; fill: #1565c0; }
    .label { text-anchor: middle; font-size: 10px; fill: #888; }
    .label-b { text-anchor: middle; font-size: 10px; fill: #1565c0; font-weight: 600; }
    .arr { stroke: #bbb; stroke-width: 1.2; fill: none; marker-end: url(#a); }
    .type { text-anchor: middle; font-size: 9.5px; fill: #1565c0; font-weight: 600; }
  </style>
  <defs>
    <marker id="a" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5" fill="#bbb"/></marker>
  </defs>

  <!-- Title -->
  <text x="350" y="18" text-anchor="middle" font-size="11" fill="#888" font-weight="600">Constraint 2: bounded storage → three forced types</text>

  <!-- Perceive (forced) -->
  <rect class="box-forced" x="15" y="50" width="90" height="36"/>
  <text class="name-forced" x="60" y="68">Perceive</text>
  <text class="type" x="60" y="100">encoded</text>
  <text class="label" x="60" y="114">type bridge</text>

  <line class="arr" x1="105" y1="68" x2="125" y2="68"/>

  <!-- Cache (forced) -->
  <rect class="box-forced" x="125" y="50" width="90" height="36"/>
  <text class="name-forced" x="170" y="68">Cache</text>
  <text class="type" x="170" y="100">indexed</text>
  <text class="label" x="170" y="114">pigeonhole</text>

  <line class="arr" x1="215" y1="68" x2="235" y2="68"/>

  <!-- Empty slots -->
  <rect class="box-empty" x="235" y="50" width="90" height="36"/>
  <text class="name" x="280" y="68" fill="#ccc">?</text>

  <line class="arr" x1="325" y1="68" x2="345" y2="68"/>

  <rect class="box-empty" x="345" y="50" width="90" height="36"/>
  <text class="name" x="390" y="68" fill="#ccc">?</text>

  <line class="arr" x1="435" y1="68" x2="455" y2="68"/>

  <!-- Remember (forced) -->
  <rect class="box-forced" x="455" y="50" width="90" height="36"/>
  <text class="name-forced" x="500" y="68">Remember</text>
  <text class="type" x="500" y="100">persisted</text>
  <text class="label" x="500" y="114">loop closure</text>

  <line class="arr" x1="545" y1="68" x2="565" y2="68"/>

  <rect class="box-empty" x="565" y="50" width="90" height="36"/>
  <text class="name" x="610" y="68" fill="#ccc">?</text>

  <!-- State evolution -->
  <path d="M610,86 Q610,158 350,158 Q60,158 60,86" stroke="#1565c0" stroke-width="1" fill="none" stroke-dasharray="5,3"/>
  <text class="label-b" x="350" y="173">state evolution</text>
</svg>
