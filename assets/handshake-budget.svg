<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 170" width="350" font-family="system-ui, sans-serif">
  <style>
    .bar { rx: 2; }
    .lossless { fill: #bbdefb; }
    .lossy { fill: #ffcdd2; }
    .backward { fill: #e1bee7; }
    .label { text-anchor: middle; font-size: 11px; font-weight: 500; }
    .delta { text-anchor: middle; font-size: 10px; }
    .plus { fill: #1565c0; }
    .minus { fill: #c62828; }
    .zero { fill: #999; }
    .axis { stroke: #ccc; stroke-width: 1; }
    .sep { stroke: #ccc; stroke-width: 1; stroke-dasharray: 4,3; }
    .section { text-anchor: middle; font-size: 9px; fill: #aaa; font-weight: 500; letter-spacing: 0.05em; }
  </style>

  <!-- Baseline -->
  <line class="axis" x1="25" y1="128" x2="675" y2="128"/>

  <!-- Section labels -->
  <text class="section" x="248" y="12">FORWARD PASS</text>
  <text class="section" x="610" y="12">BACKWARD</text>

  <!-- Separator -->
  <line class="sep" x1="520" y1="20" x2="520" y2="128"/>

  <!-- Forward pass bars -->

  <!-- Perceive: 90px tall (injects bits) -->
  <rect class="bar lossless" x="30" y="38" width="80" height="90"/>
  <text class="delta plus" x="70" y="28">+bits</text>
  <text class="label" x="70" y="152">Perceive</text>

  <!-- Cache: 90px (lossless) -->
  <rect class="bar lossless" x="128" y="38" width="80" height="90"/>
  <text class="delta zero" x="168" y="28">=</text>
  <text class="label" x="168" y="152">Cache</text>

  <!-- Filter: 62px (lossy) -->
  <rect class="bar lossy" x="226" y="66" width="80" height="62"/>
  <text class="delta minus" x="266" y="56">−bits</text>
  <text class="label" x="266" y="152">Filter</text>

  <!-- Attend: 44px (lossy) -->
  <rect class="bar lossy" x="324" y="84" width="80" height="44"/>
  <text class="delta minus" x="364" y="74">−bits</text>
  <text class="label" x="364" y="152">Attend</text>

  <!-- Remember: 44px (lossless, preserves Attend output) -->
  <rect class="bar lossless" x="422" y="84" width="80" height="44"/>
  <text class="delta zero" x="462" y="74">=</text>
  <text class="label" x="462" y="152">Remember</text>

  <!-- Consolidate: 32px (lossy, different kind — compresses to policy) -->
  <rect class="bar backward" x="558" y="96" width="80" height="32"/>
  <text class="delta minus" x="598" y="86">−bits</text>
  <text class="label" x="598" y="152">Consolidate</text>

  <!-- Annotation -->
  <text x="350" y="168" text-anchor="middle" font-size="9" fill="#aaa">information retained per cycle</text>
</svg>
