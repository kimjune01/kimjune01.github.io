<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" font-family="system-ui, sans-serif">
  <style>
    .box { rx: 4; stroke-width: 1.5; }
    .wire { stroke-width: 1.5; fill: none; }
    .label { font-size: 12px; font-weight: 600; text-anchor: middle; }
    .sublabel { font-size: 10px; fill: #888; text-anchor: middle; }
    .eq { font-size: 16px; font-weight: 600; text-anchor: middle; }
  </style>

  <!-- Left side: Deterministic (copy then f = f then copy) -->
  <text class="label" x="175" y="18" fill="#1565c0">Deterministic</text>

  <!-- Input wire -->
  <line class="wire" x1="100" y1="40" x2="100" y2="60" stroke="#1565c0"/>
  <!-- Copy node -->
  <circle cx="100" cy="65" r="5" fill="#1565c0"/>
  <!-- Two output wires from copy -->
  <line class="wire" x1="100" y1="70" x2="70" y2="90" stroke="#1565c0"/>
  <line class="wire" x1="100" y1="70" x2="130" y2="90" stroke="#1565c0"/>
  <!-- Two f boxes -->
  <rect class="box" x="52" y="90" width="36" height="24" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="70" y="106" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="600">f</text>
  <rect class="box" x="112" y="90" width="36" height="24" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="130" y="106" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="600">f</text>
  <!-- Output wires -->
  <line class="wire" x1="70" y1="114" x2="70" y2="140" stroke="#1565c0"/>
  <line class="wire" x1="130" y1="114" x2="130" y2="140" stroke="#1565c0"/>

  <!-- Equals sign -->
  <text class="eq" x="175" y="100" fill="#1565c0">=</text>

  <!-- Right: f then copy -->
  <line class="wire" x1="250" y1="40" x2="250" y2="60" stroke="#1565c0"/>
  <rect class="box" x="232" y="60" width="36" height="24" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="250" y="76" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="600">f</text>
  <line class="wire" x1="250" y1="84" x2="250" y2="100" stroke="#1565c0"/>
  <circle cx="250" cy="105" r="5" fill="#1565c0"/>
  <line class="wire" x1="250" y1="110" x2="220" y2="140" stroke="#1565c0"/>
  <line class="wire" x1="250" y1="110" x2="280" y2="140" stroke="#1565c0"/>

  <text class="sublabel" x="175" y="165">same output</text>

  <!-- Divider -->
  <line x1="350" y1="30" x2="350" y2="170" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Right side: Stochastic (copy then f ≠ f then copy) -->
  <text class="label" x="525" y="18" fill="#e65100">Stochastic</text>

  <!-- Input wire -->
  <line class="wire" x1="450" y1="40" x2="450" y2="60" stroke="#e65100"/>
  <!-- Copy node -->
  <circle cx="450" cy="65" r="5" fill="#e65100"/>
  <!-- Two output wires from copy -->
  <line class="wire" x1="450" y1="70" x2="420" y2="90" stroke="#e65100"/>
  <line class="wire" x1="450" y1="70" x2="480" y2="90" stroke="#e65100"/>
  <!-- Two f boxes -->
  <rect class="box" x="402" y="90" width="36" height="24" fill="#fff3e0" stroke="#e65100"/>
  <text x="420" y="106" text-anchor="middle" font-size="11" fill="#e65100" font-weight="600">f</text>
  <rect class="box" x="462" y="90" width="36" height="24" fill="#fff3e0" stroke="#e65100"/>
  <text x="480" y="106" text-anchor="middle" font-size="11" fill="#e65100" font-weight="600">f</text>
  <!-- Output wires (diverging) -->
  <line class="wire" x1="420" y1="114" x2="420" y2="140" stroke="#e65100"/>
  <line class="wire" x1="480" y1="114" x2="480" y2="140" stroke="#e65100"/>
  <text x="420" y="155" text-anchor="middle" font-size="9" fill="#e65100">y₁</text>
  <text x="480" y="155" text-anchor="middle" font-size="9" fill="#e65100">y₂</text>

  <!-- Not-equals sign -->
  <text class="eq" x="525" y="100" fill="#e65100">≠</text>

  <!-- Right: f then copy -->
  <line class="wire" x1="600" y1="40" x2="600" y2="60" stroke="#e65100"/>
  <rect class="box" x="582" y="60" width="36" height="24" fill="#fff3e0" stroke="#e65100"/>
  <text x="600" y="76" text-anchor="middle" font-size="11" fill="#e65100" font-weight="600">f</text>
  <line class="wire" x1="600" y1="84" x2="600" y2="100" stroke="#e65100"/>
  <circle cx="600" cy="105" r="5" fill="#e65100"/>
  <line class="wire" x1="600" y1="110" x2="570" y2="140" stroke="#e65100"/>
  <line class="wire" x1="600" y1="110" x2="630" y2="140" stroke="#e65100"/>
  <text x="570" y="155" text-anchor="middle" font-size="9" fill="#e65100">y</text>
  <text x="630" y="155" text-anchor="middle" font-size="9" fill="#e65100">y</text>

  <text class="sublabel" x="525" y="165">different outputs</text>
</svg>
