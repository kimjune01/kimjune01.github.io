<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" font-family="system-ui, sans-serif">
  <style>
    .item { rx: 4; stroke-width: 1.5; }
    .pass { fill: #e3f2fd; stroke: #1565c0; }
    .fail { fill: #fafafa; stroke: #ddd; }
    .label { font-size: 13px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
    .label-pass { fill: #1565c0; }
    .label-fail { fill: #ccc; }
    .zone-label { font-size: 11px; fill: #888; font-weight: 500; }
  </style>
  <defs>
    <marker id="b" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5" fill="#1565c0"/></marker>
    <marker id="g" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5" fill="#ddd"/></marker>
  </defs>

  <!-- Input label -->
  <text class="zone-label" x="28" y="18">X  (indexed)</text>

  <!-- Input items -->
  <rect class="item pass" x="28" y="30" width="40" height="36"/>
  <text class="label label-pass" x="48" y="48">a</text>

  <rect class="item fail" x="80" y="30" width="40" height="36"/>
  <text class="label label-fail" x="100" y="48">b</text>

  <rect class="item pass" x="132" y="30" width="40" height="36"/>
  <text class="label label-pass" x="152" y="48">c</text>

  <rect class="item fail" x="184" y="30" width="40" height="36"/>
  <text class="label label-fail" x="204" y="48">d</text>

  <!-- Filter box -->
  <rect x="280" y="22" width="110" height="52" rx="6" fill="#fff" stroke="#1565c0" stroke-width="2"/>
  <text x="335" y="43" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Filter</text>
  <text x="335" y="59" text-anchor="middle" font-size="9" fill="#1565c0">0-1 matrix</text>

  <!-- Pass arrows (a, c) -->
  <line x1="68" y1="42" x2="280" y2="40" stroke="#1565c0" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="172" y1="42" x2="280" y2="52" stroke="#1565c0" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- Reject arrows (b, d) — fade down -->
  <line x1="120" y1="56" x2="200" y2="80" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="224" y1="56" x2="250" y2="80" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="240" y="94" font-size="10" fill="#ccc">→ ⊥</text>

  <!-- Output arrows -->
  <line x1="390" y1="40" x2="460" y2="44" stroke="#1565c0" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="390" y1="52" x2="460" y2="50" stroke="#1565c0" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- Output items -->
  <rect class="item pass" x="460" y="28" width="40" height="36"/>
  <text class="label label-pass" x="480" y="46">a</text>

  <rect class="item pass" x="512" y="28" width="40" height="36"/>
  <text class="label label-pass" x="532" y="46">c</text>

  <!-- Output label -->
  <text class="zone-label" x="476" y="18">Y  (gated)</text>

  <!-- Bottom annotation -->
  <rect x="115" y="110" width="440" height="40" rx="6" fill="#f5f5f5" stroke="none"/>
  <text x="335" y="128" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="600">copy ∘ f = (f ⊗ f) ∘ copy  ✓</text>
  <text x="335" y="143" text-anchor="middle" font-size="10" fill="#888">deterministic: same input, same gate</text>
</svg>
