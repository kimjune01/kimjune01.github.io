<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" font-family="system-ui, sans-serif" font-size="14">
  <style>
    .label { font-weight: 600; font-size: 16px; text-anchor: middle; }
    .step { fill: #fff; stroke: #999; stroke-width: 1; rx: 5; }
    .step-sealed { fill: #fff; stroke: #c62828; stroke-width: 1.5; rx: 5; stroke-dasharray: 5,3; }
    .step-name { text-anchor: middle; dominant-baseline: central; font-weight: 500; font-size: 14px; }
    .step-sub { text-anchor: middle; font-size: 12px; fill: #555; }
    .step-sealed-sub { text-anchor: middle; font-size: 12px; fill: #c62828; font-style: italic; }
    .step-nil { text-anchor: middle; font-size: 12px; fill: #bbb; font-style: italic; }
    .step-shallow { fill: #fff; stroke: #bbb; stroke-width: 1; rx: 5; stroke-dasharray: 2,2; }
    .step-shallow-sub { text-anchor: middle; font-size: 12px; fill: #999; font-style: italic; }
    .step-prompted { fill: #fff; stroke: #e65100; stroke-width: 1.5; rx: 5; stroke-dasharray: 5,3; }
    .step-prompted-sub { text-anchor: middle; font-size: 12px; fill: #e65100; font-style: italic; }
    .arrow { stroke: #999; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .connector { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .bk-sealed { stroke: #c62828; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#ah-sealed); }
    .bk-nil { stroke: #ccc; stroke-width: 1; fill: none; stroke-dasharray: 3,3; }
    .bk-prompted { stroke: #e65100; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#ah-prompted); }
    .bk-label-sealed { text-anchor: start; font-size: 11px; fill: #c62828; font-style: italic; }
    .bk-label-nil { text-anchor: start; font-size: 11px; fill: #bbb; font-style: italic; }
    .bk-label-prompted { text-anchor: start; font-size: 11px; fill: #e65100; font-style: italic; }
    .group { stroke: #ccc; stroke-width: 1; rx: 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
    <marker id="ah-sealed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c62828"/>
    </marker>
    <marker id="ah-prompted" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e65100"/>
    </marker>
  </defs>

  <!-- ==================== Inference ==================== -->
  <text class="label" x="600" y="20">Inference</text>
  <rect class="group" x="20" y="28" width="1130" height="62" fill="#bbdefb"/>

  <rect class="step" x="30" y="36" width="190" height="48"/>
  <text class="step-name" x="125" y="53">Perceive</text>
  <text class="step-sub" x="125" y="73">Embed</text>
  <line class="arrow" x1="220" y1="60" x2="250" y2="60"/>

  <rect class="step" x="250" y="36" width="190" height="48"/>
  <text class="step-name" x="345" y="53">Cache</text>
  <text class="step-sub" x="345" y="73">Positional encoding</text>
  <line class="arrow" x1="440" y1="60" x2="470" y2="60"/>

  <rect class="step" x="470" y="36" width="190" height="48"/>
  <text class="step-name" x="565" y="53">Filter</text>
  <text class="step-sub" x="565" y="73">Softmax</text>
  <line class="arrow" x1="660" y1="60" x2="690" y2="60"/>

  <rect class="step" x="690" y="36" width="190" height="48"/>
  <text class="step-name" x="785" y="53">Attend</text>
  <text class="step-sub" x="785" y="73">Multi-head attention</text>
  <line class="arrow" x1="880" y1="60" x2="910" y2="60"/>

  <rect class="step" x="910" y="36" width="210" height="48"/>
  <text class="step-name" x="1015" y="53">Remember</text>
  <text class="step-sub" x="1015" y="73">Weights (read-only)</text>

  <!-- Consolidate backward: sealed -->
  <path class="bk-sealed" d="M1015,84 L1015,102 L250,102"/>
  <text class="bk-label-sealed" x="260" y="98">Consolidate — Training (sealed)</text>

  <!-- Inference → Chatbot connector -->
  <path class="connector" d="M1015,102 L1015,128 L125,128 L125,168"/>
  <text x="570" y="140" text-anchor="middle" font-size="11" fill="#666">tokens</text>

  <!-- ==================== Chatbot ==================== -->
  <text class="label" x="600" y="162">Chatbot</text>
  <rect class="group" x="20" y="170" width="1130" height="62" fill="#e1bee7"/>

  <rect class="step" x="30" y="178" width="190" height="48"/>
  <text class="step-name" x="125" y="195">Perceive</text>
  <text class="step-sub" x="125" y="215">Tokens</text>
  <line class="arrow" x1="220" y1="202" x2="250" y2="202"/>

  <rect class="step" x="250" y="178" width="190" height="48"/>
  <text class="step-name" x="345" y="195">Cache</text>
  <text class="step-sub" x="345" y="215">Token context</text>
  <line class="arrow" x1="440" y1="202" x2="470" y2="202"/>

  <rect class="step" x="470" y="178" width="190" height="48"/>
  <text class="step-name" x="565" y="195">Filter</text>
  <text class="step-nil" x="565" y="215">nil</text>
  <line class="arrow" x1="660" y1="202" x2="690" y2="202"/>

  <rect class="step" x="690" y="178" width="190" height="48"/>
  <text class="step-name" x="785" y="195">Attend</text>
  <text class="step-nil" x="785" y="215">nil</text>
  <line class="arrow" x1="880" y1="202" x2="910" y2="202"/>

  <rect class="step" x="910" y="178" width="210" height="48"/>
  <text class="step-name" x="1015" y="195">Remember</text>
  <text class="step-nil" x="1015" y="215">nil</text>

  <!-- Consolidate backward: nil -->
  <path class="bk-nil" d="M1015,226 L1015,244 L250,244"/>
  <text class="bk-label-nil" x="260" y="240">Consolidate — nil</text>

  <!-- Chatbot → Agent connector -->
  <path class="connector" d="M1015,244 L1015,270 L125,270 L125,310"/>
  <text x="570" y="282" text-anchor="middle" font-size="11" fill="#666">messages</text>

  <!-- ==================== Agent ==================== -->
  <text class="label" x="600" y="304">Agent</text>
  <rect class="group" x="20" y="312" width="1130" height="62" fill="#ffe0b2"/>

  <rect class="step" x="30" y="320" width="190" height="48"/>
  <text class="step-name" x="125" y="337">Perceive</text>
  <text class="step-sub" x="125" y="357">Prompts</text>
  <line class="arrow" x1="220" y1="344" x2="250" y2="344"/>

  <rect class="step" x="250" y="320" width="190" height="48"/>
  <text class="step-name" x="345" y="337">Cache</text>
  <text class="step-sub" x="345" y="357">Context window</text>
  <line class="arrow" x1="440" y1="344" x2="470" y2="344"/>

  <rect class="step-shallow" x="470" y="320" width="190" height="48"/>
  <text class="step-name" x="565" y="337">Filter</text>
  <text class="step-shallow-sub" x="565" y="357">Shallow</text>
  <line class="arrow" x1="660" y1="344" x2="690" y2="344"/>

  <rect class="step-shallow" x="690" y="320" width="190" height="48"/>
  <text class="step-name" x="785" y="337">Attend</text>
  <text class="step-shallow-sub" x="785" y="357">Reactive</text>
  <line class="arrow" x1="880" y1="344" x2="910" y2="344"/>

  <rect class="step" x="910" y="320" width="210" height="48"/>
  <text class="step-name" x="1015" y="337">Remember</text>
  <text class="step-sub" x="1015" y="357">Filesystem</text>

  <!-- Consolidate backward: prompted -->
  <path class="bk-prompted" d="M1015,368 L1015,400 L250,400"/>
  <text class="bk-label-prompted" x="260" y="396">Consolidate — Create skill (prompted)</text>

</svg>
