<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="system-ui, -apple-system, sans-serif">
  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#888" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#2e7d32" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333" letter-spacing="0.02em">The Authority Rule Workflow</text>

  <!-- Phase labels -->
  <text x="170" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#888" letter-spacing="0.08em">INPUTS</text>
  <text x="480" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#888" letter-spacing="0.08em">IMPLEMENT</text>
  <text x="790" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#888" letter-spacing="0.08em">SYNTHESIZE</text>

  <!-- Phase dividers -->
  <line x1="310" y1="50" x2="310" y2="500" stroke="#ddd" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="650" y1="50" x2="650" y2="500" stroke="#ddd" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- INPUT BOXES -->
  <!-- Ground truth -->
  <rect x="60" y="85" width="210" height="52" rx="6" fill="#bbdefb" stroke="#90caf9" stroke-width="1"/>
  <text x="165" y="107" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Ground Truth</text>
  <text x="165" y="125" text-anchor="middle" font-size="11" fill="#555" font-style="italic">existing source + tests</text>

  <!-- Prose spec -->
  <rect x="60" y="155" width="210" height="52" rx="6" fill="#d4e4f7" stroke="#a8c8e8" stroke-width="1"/>
  <text x="165" y="177" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Prose Spec</text>
  <text x="165" y="195" text-anchor="middle" font-size="11" fill="#555" font-style="italic">the hypothesis</text>

  <!-- Prototype -->
  <rect x="60" y="225" width="210" height="52" rx="6" fill="#e1bee7" stroke="#ce93d8" stroke-width="1"/>
  <text x="165" y="247" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Prototype</text>
  <text x="165" y="265" text-anchor="middle" font-size="11" fill="#555" font-style="italic">existence proof</text>

  <!-- Authority rule -->
  <rect x="60" y="310" width="210" height="52" rx="6" fill="#ffe0b2" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="165" y="332" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Authority Rule</text>
  <text x="165" y="350" text-anchor="middle" font-size="11" fill="#555" font-style="italic">no regressions, UX improvement</text>

  <!-- IMPLEMENT: Two blind LLMs -->
  <!-- LLM A -->
  <rect x="365" y="110" width="200" height="68" rx="6" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="465" y="137" text-anchor="middle" font-size="14" font-weight="600" fill="#333">LLM A</text>
  <text x="465" y="155" text-anchor="middle" font-size="11" fill="#555">blind implementation</text>
  <text x="465" y="170" text-anchor="middle" font-size="10" fill="#888" font-style="italic">architecture + config</text>

  <!-- LLM B -->
  <rect x="365" y="210" width="200" height="68" rx="6" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="465" y="237" text-anchor="middle" font-size="14" font-weight="600" fill="#333">LLM B</text>
  <text x="465" y="255" text-anchor="middle" font-size="11" fill="#555">blind implementation</text>
  <text x="465" y="270" text-anchor="middle" font-size="10" fill="#888" font-style="italic">defensive patterns + types</text>

  <!-- Cross-review -->
  <rect x="365" y="330" width="200" height="52" rx="6" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="465" y="352" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Cross-Review</text>
  <text x="465" y="368" text-anchor="middle" font-size="11" fill="#555" font-style="italic">compare, find contradictions</text>

  <!-- SYNTHESIZE -->
  <rect x="695" y="160" width="200" height="68" rx="6" fill="#c8e6c9" stroke="#81c784" stroke-width="1.5"/>
  <text x="795" y="187" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Synthesis</text>
  <text x="795" y="205" text-anchor="middle" font-size="11" fill="#555">absorb best of both</text>
  <text x="795" y="220" text-anchor="middle" font-size="10" fill="#2e7d32" font-style="italic">closest to production</text>

  <!-- Fresh judge -->
  <rect x="695" y="280" width="200" height="52" rx="6" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
  <text x="795" y="302" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Fresh Judge</text>
  <text x="795" y="320" text-anchor="middle" font-size="11" fill="#555" font-style="italic">blind review of all four</text>

  <!-- ARROWS: inputs → LLMs -->
  <line x1="270" y1="135" x2="360" y2="140" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="270" y1="165" x2="360" y2="155" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="270" y1="180" x2="360" y2="235" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="270" y1="250" x2="360" y2="245" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Authority rule → both LLMs -->
  <path d="M270,336 Q320,336 340,200 Q345,148 360,144" fill="none" stroke="#e65100" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <path d="M270,336 Q320,336 340,280 Q345,248 360,244" fill="none" stroke="#e65100" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- LLMs → cross-review -->
  <line x1="465" y1="178" x2="465" y2="325" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="465" y1="278" x2="465" y2="325" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Cross-review → synthesis -->
  <line x1="565" y1="356" x2="690" y2="220" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- LLM A → synthesis (direct) -->
  <line x1="565" y1="144" x2="690" y2="180" stroke="#888" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>

  <!-- Synthesis → judge -->
  <line x1="795" y1="228" x2="795" y2="275" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Bottom annotation -->
  <text x="480" y="440" text-anchor="middle" font-size="12" fill="#555">Neither implementation alone was shippable.</text>
  <text x="480" y="458" text-anchor="middle" font-size="12" fill="#555">The review loop between them produced the best result.</text>

  <!-- Stats -->
  <text x="480" y="495" text-anchor="middle" font-size="11" fill="#888">A alone: 2 critical bugs · B alone: 3 critical bugs · C alone: 3 critical bugs · D (synthesis): closest to ship</text>
</svg>
