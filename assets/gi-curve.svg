<svg viewBox="0 0 520 320" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif;">
  <!-- axes -->
  <line x1="60" y1="20" x2="60" y2="270" stroke="#888" stroke-width="1.5"/>
  <line x1="60" y1="270" x2="500" y2="270" stroke="#888" stroke-width="1.5"/>
  <text x="30" y="150" text-anchor="middle" font-size="12" fill="#888" transform="rotate(-90,30,150)">capability</text>
  <text x="280" y="295" text-anchor="middle" font-size="12" fill="#888">iterations</text>

  <!-- threshold (flat dashed) -->
  <line x1="60" y1="100" x2="490" y2="100" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="8,6"/>
  <text x="494" y="104" font-size="11" fill="#9e9e9e" font-style="italic">threshold</text>

  <!-- linear (straight line) -->
  <line x1="60" y1="250" x2="460" y2="80" stroke="#1565c0" stroke-width="2"/>
  <text x="464" y="76" font-size="11" fill="#1565c0" font-style="italic">linear</text>

  <!-- GI curve (sigmoid / superlinear with inflection) -->
  <path d="M 60 260 C 120 258, 200 252, 260 220 C 300 198, 330 160, 360 100 C 390 40, 420 22, 490 18" stroke="#c62828" stroke-width="2.5" fill="none"/>

  <!-- inflection point -->
  <circle cx="310" cy="140" r="5" fill="#c62828"/>
  <text x="318" y="134" font-size="11" fill="#c62828" font-weight="600">inflection</text>

  <!-- GI label -->
  <text x="494" y="16" font-size="11" fill="#c62828" font-weight="600" font-style="italic">GI</text>
</svg>
