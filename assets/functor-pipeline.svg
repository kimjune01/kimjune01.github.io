<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .title { font-weight: 700; font-size: 15px; text-anchor: middle; letter-spacing: 0.02em; }
    .node { stroke: #555; stroke-width: 1.5; fill: #fff; }
    .node-start { fill: #bbb; stroke: #999; stroke-width: 1; }
    .node-text { text-anchor: middle; dominant-baseline: central; font-weight: 700; font-size: 14px; fill: #333; }
    .arrow { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .step-label { text-anchor: middle; font-size: 12px; fill: #333; font-weight: 600; }
    .functor { stroke: #555; stroke-width: 1.5; fill: none; stroke-dasharray: 7,5; marker-end: url(#ahf); }
    .functor-label { text-anchor: middle; font-size: 12px; fill: #555; font-style: italic; font-weight: 500; }
    .backward { stroke: #999; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; marker-end: url(#ahb); }
    .backward-label { text-anchor: middle; font-size: 11px; fill: #999; font-style: italic; }
    .group { stroke: none; rx: 12; }
  </style>
  <defs>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#888"/>
    </marker>
    <marker id="ahf" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#555"/>
    </marker>
    <marker id="ahb" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#999"/>
    </marker>
  </defs>

  <!-- COGNITION row -->
  <text class="title" x="440" y="18">COGNITION — object type: Moment</text>
  <rect class="group" x="20" y="28" width="810" height="68" fill="#d4e4f7"/>

  <circle class="node-start" cx="55" cy="62" r="11"/>
  <line class="arrow" x1="66" y1="62" x2="182" y2="62"/>
  <text class="step-label" x="124" y="50">Perceive</text>

  <circle class="node" cx="200" cy="62" r="18"/>
  <text class="node-text" x="200" y="62">M</text>
  <line class="arrow" x1="218" y1="62" x2="332" y2="62"/>
  <text class="step-label" x="275" y="50">Cache</text>

  <circle class="node" cx="350" cy="62" r="18"/>
  <text class="node-text" x="350" y="62">M</text>
  <line class="arrow" x1="368" y1="62" x2="482" y2="62"/>
  <text class="step-label" x="425" y="50">Filter</text>

  <circle class="node" cx="500" cy="62" r="18"/>
  <text class="node-text" x="500" y="62">M</text>
  <line class="arrow" x1="518" y1="62" x2="632" y2="62"/>
  <text class="step-label" x="575" y="50">Attend</text>

  <circle class="node" cx="650" cy="62" r="18"/>
  <text class="node-text" x="650" y="62">M</text>
  <line class="arrow" x1="668" y1="62" x2="782" y2="62"/>
  <text class="step-label" x="725" y="50">Remember</text>

  <circle class="node" cx="800" cy="62" r="18"/>
  <text class="node-text" x="800" y="62">M</text>

  <!-- Consolidate backward pass (below row, dashed arrow pointing left) -->
  <path class="backward" d="M800,80 L800,106 L120,106"/>
  <text class="backward-label" x="460" y="100">Consolidate (backward pass)</text>

  <!-- Functor connector (routes right of group, then down and across) -->
  <path class="functor" d="M818,62 L850,62 L850,152 L55,152 L55,202"/>
  <text class="functor-label" x="428" y="145">Functor: Remember → Perceive</text>

  <!-- WRITING row -->
  <text class="title" x="440" y="190">WRITING — object type: Draft</text>
  <rect class="group" x="20" y="200" width="810" height="68" fill="#d4edd4"/>

  <circle class="node-start" cx="55" cy="234" r="11"/>
  <line class="arrow" x1="66" y1="234" x2="182" y2="234"/>
  <text class="step-label" x="124" y="222">Perceive</text>

  <circle class="node" cx="200" cy="234" r="18"/>
  <text class="node-text" x="200" y="234">D</text>
  <line class="arrow" x1="218" y1="234" x2="332" y2="234"/>
  <text class="step-label" x="275" y="222">Cache</text>

  <circle class="node" cx="350" cy="234" r="18"/>
  <text class="node-text" x="350" y="234">D</text>
  <line class="arrow" x1="368" y1="234" x2="482" y2="234"/>
  <text class="step-label" x="425" y="222">Filter</text>

  <circle class="node" cx="500" cy="234" r="18"/>
  <text class="node-text" x="500" y="234">D</text>
  <line class="arrow" x1="518" y1="234" x2="632" y2="234"/>
  <text class="step-label" x="575" y="222">Attend</text>

  <circle class="node" cx="650" cy="234" r="18"/>
  <text class="node-text" x="650" y="234">D</text>
  <line class="arrow" x1="668" y1="234" x2="782" y2="234"/>
  <text class="step-label" x="725" y="222">Remember</text>

  <circle class="node" cx="800" cy="234" r="18"/>
  <text class="node-text" x="800" y="234">D</text>
</svg>
