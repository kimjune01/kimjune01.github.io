<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 300" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .title { font-weight: 700; font-size: 15px; text-anchor: middle; letter-spacing: 0.02em; }
    .node { stroke: #555; stroke-width: 1.5; fill: #fff; }
    .node-start { fill: #bbb; stroke: #999; stroke-width: 1; }
    .node-con { stroke: #555; stroke-width: 1.5; fill: #fff; stroke-dasharray: 0; }
    .node-text { text-anchor: middle; dominant-baseline: central; font-weight: 700; font-size: 14px; fill: #333; }
    .arrow { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .step-label { text-anchor: middle; font-size: 12px; fill: #333; font-weight: 600; }
    .con-label { text-anchor: middle; font-size: 12px; fill: #333; font-weight: 600; font-style: italic; }
    .functor { stroke: #555; stroke-width: 1.5; fill: none; stroke-dasharray: 7,5; marker-end: url(#ahf); }
    .functor-label { text-anchor: middle; font-size: 12px; fill: #555; font-style: italic; font-weight: 500; }
    .policy-w { stroke: #1565c0; stroke-width: 1; fill: none; stroke-dasharray: 5,3; }
    .policy-label { text-anchor: middle; font-size: 10px; fill: #1565c0; font-weight: 500; }
    .group { stroke: none; rx: 12; }
  </style>
  <defs>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#888"/>
    </marker>
    <marker id="ahf" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#555"/>
    </marker>
  </defs>

  <!-- COGNITION row -->
  <text class="title" x="490" y="18">COGNITION — object type: Moment</text>
  <rect class="group" x="20" y="28" width="960" height="68" fill="#d4e4f7"/>

  <circle class="node-start" cx="55" cy="62" r="11"/>
  <line class="arrow" x1="66" y1="62" x2="132" y2="62"/>
  <text class="step-label" x="100" y="50">Perceive</text>

  <circle class="node" cx="150" cy="62" r="18"/>
  <text class="node-text" x="150" y="62">M</text>
  <line class="arrow" x1="168" y1="62" x2="282" y2="62"/>
  <text class="step-label" x="225" y="50">Cache</text>

  <circle class="node" cx="300" cy="62" r="18"/>
  <text class="node-text" x="300" y="62">M</text>
  <line class="arrow" x1="318" y1="62" x2="432" y2="62"/>
  <text class="step-label" x="375" y="50">Filter</text>

  <circle class="node" cx="450" cy="62" r="18"/>
  <text class="node-text" x="450" y="62">M</text>
  <line class="arrow" x1="468" y1="62" x2="582" y2="62"/>
  <text class="step-label" x="525" y="50">Attend</text>

  <circle class="node" cx="600" cy="62" r="18"/>
  <text class="node-text" x="600" y="62">M</text>
  <line class="arrow" x1="618" y1="62" x2="732" y2="62"/>
  <text class="step-label" x="675" y="50">Remember</text>

  <circle class="node" cx="750" cy="62" r="18"/>
  <text class="node-text" x="750" y="62">M</text>
  <line class="arrow" x1="768" y1="62" x2="882" y2="62"/>
  <text class="con-label" x="825" y="50">Consolidate</text>

  <circle class="node-con" cx="900" cy="62" r="18"/>
  <text class="node-text" x="900" y="62" style="font-style:italic">S</text>

  <!-- Policy store write (cognition row) -->
  <path class="policy-w" d="M900,80 L900,106 L120,106"/>
  <text class="policy-label" x="510" y="100">writes to policy store → parameterizes next cycle</text>

  <!-- Functor connector -->
  <path class="functor" d="M918,62 L950,62 L950,152 L55,152 L55,202"/>
  <text class="functor-label" x="490" y="145">Functor: Remember → Perceive</text>

  <!-- WRITING row -->
  <text class="title" x="490" y="190">WRITING — object type: Draft</text>
  <rect class="group" x="20" y="200" width="960" height="68" fill="#d4edd4"/>

  <circle class="node-start" cx="55" cy="234" r="11"/>
  <line class="arrow" x1="66" y1="234" x2="132" y2="234"/>
  <text class="step-label" x="100" y="222">Perceive</text>

  <circle class="node" cx="150" cy="234" r="18"/>
  <text class="node-text" x="150" y="234">D</text>
  <line class="arrow" x1="168" y1="234" x2="282" y2="234"/>
  <text class="step-label" x="225" y="222">Cache</text>

  <circle class="node" cx="300" cy="234" r="18"/>
  <text class="node-text" x="300" y="234">D</text>
  <line class="arrow" x1="318" y1="234" x2="432" y2="234"/>
  <text class="step-label" x="375" y="222">Filter</text>

  <circle class="node" cx="450" cy="234" r="18"/>
  <text class="node-text" x="450" y="234">D</text>
  <line class="arrow" x1="468" y1="234" x2="582" y2="234"/>
  <text class="step-label" x="525" y="222">Attend</text>

  <circle class="node" cx="600" cy="234" r="18"/>
  <text class="node-text" x="600" y="234">D</text>
  <line class="arrow" x1="618" y1="234" x2="732" y2="234"/>
  <text class="step-label" x="675" y="222">Remember</text>

  <circle class="node" cx="750" cy="234" r="18"/>
  <text class="node-text" x="750" y="234">D</text>
  <line class="arrow" x1="768" y1="234" x2="882" y2="234"/>
  <text class="con-label" x="825" y="222">Consolidate</text>

  <circle class="node-con" cx="900" cy="234" r="18"/>
  <text class="node-text" x="900" y="234" style="font-style:italic">S</text>
</svg>
