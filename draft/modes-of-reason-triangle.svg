<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .node-text { text-anchor: middle; font-weight: 700; font-size: 16px; fill: #333; }
    .node-sub { text-anchor: middle; font-size: 11px; fill: #888; }
    .arrow { stroke: #aaa; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .arrow-abd { stroke: #c9a84c; stroke-width: 2; fill: none; marker-end: url(#ahg); }
    .label { font-size: 12px; fill: #777; font-weight: 600; font-style: italic; }
    .label-abd { font-size: 12px; fill: #c9a84c; font-weight: 600; font-style: italic; }
    .mode { font-size: 10px; font-weight: 700; }
    .mode-abd { fill: #c9a84c; }
    .mode-ded { fill: #777; }
    .mode-ind { fill: #777; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#aaa"/>
    </marker>
    <marker id="ahg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c9a84c"/>
    </marker>
  </defs>

  <!-- Background: circle -->
  <circle cx="230" cy="170" r="148" stroke="#e8e8e8" stroke-width="1" fill="none"/>

  <!-- Background: inscribed triangle -->
  <polygon points="230,22 102,244 358,244" stroke="#e8ddd0" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- epmem → smem (left side — ABDUCTION, gold) -->
  <path class="arrow-abd" d="M211,55 Q120,100 121,211"/>

  <!-- smem → pmem (bottom — DEDUCTION, solid) -->
  <path class="arrow" d="M140,244 Q230,290 320,244"/>

  <!-- pmem → epmem (right side — INDUCTION, solid) -->
  <path class="arrow" d="M339,211 Q340,100 249,55"/>

  <!-- Edge labels: mode name + operation -->
  <text class="label-abd" x="122" y="122" text-anchor="end">abduction</text>
  <text x="122" y="137" text-anchor="end" style="font-size:10px; fill:#c9a84c; font-style:italic;">observe → hypothesize</text>

  <text class="label" x="230" y="280" text-anchor="middle">deduction</text>
  <text x="230" y="295" text-anchor="middle" style="font-size:10px; fill:#777; font-style:italic;">knowledge → procedure</text>

  <text class="label" x="340" y="122" text-anchor="start">induction</text>
  <text x="340" y="137" text-anchor="start" style="font-size:10px; fill:#777; font-style:italic;">run → accumulate</text>

  <!-- Nodes at vertices -->
  <text class="node-text" x="230" y="28">epmem</text>
  <text class="node-sub" x="230" y="46">what happened</text>

  <text class="node-text" x="102" y="240">smem</text>
  <text class="node-sub" x="102" y="258">what is true</text>

  <text class="node-text" x="358" y="240">pmem</text>
  <text class="node-sub" x="358" y="258">how to act</text>

  <!-- Latin roots, tucked under each edge -->
  <text x="95" y="175" text-anchor="end" style="font-size:9px; fill:#bbb; font-style:italic;">ab-ducere: lead away</text>
  <text x="230" y="310" text-anchor="middle" style="font-size:9px; fill:#bbb; font-style:italic;">de-ducere: lead from</text>
  <text x="367" y="175" text-anchor="start" style="font-size:9px; fill:#bbb; font-style:italic;">in-ducere: lead toward</text>
</svg>
