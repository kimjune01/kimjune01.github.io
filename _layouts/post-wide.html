---
layout: default
---

<noscript>
	<style>

		article .footnotes {
			display: block;
		}

	</style>
</noscript>

<article class="wide">

	<div class="center">
		<h1>{{ page.title }}</h1>

	</div>

	{{ content }}

</article>

<a href="{{ site.weburl }}/feed.xml" class="rss-popup" id="rss-popup" title="Subscribe via RSS">
	<i class="fa fa-rss"></i>
</a>

<style>
.rss-popup {
	position: fixed;
	bottom: 4px;
	left: 10px;
	background: #f26522;
	color: white;
	width: 44px;
	height: 44px;
	border-radius: 50%;
	text-decoration: none;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 20px;
	box-shadow: 0 2px 8px rgba(0,0,0,0.2);
	transform: translateY(60px);
	opacity: 0;
	transition: transform 0.4s ease, opacity 0.4s ease;
	z-index: 1000;
}
.rss-popup:hover {
	background: #d55a1b;
	color: white;
}
.rss-popup.visible {
	transform: translateY(0);
	opacity: 1;
}

/* Wide layout overrides */
article.wide {
	max-width: 90vw;
	margin: 0 auto;
}
article.wide > p,
article.wide > h2,
article.wide > h3,
article.wide > h4,
article.wide > ul,
article.wide > ol,
article.wide > blockquote,
article.wide > hr,
article.wide > div.highlighter-rouge,
article.wide > .highlight {
	max-width: 500px;
	margin-left: auto;
	margin-right: auto;
}
article.wide .table-wrap {
	margin-left: auto;
	margin-right: auto;
}
article.wide .table-wrap {
	overflow-x: auto;
	-webkit-overflow-scrolling: touch;
	margin: 45px 0;
}
article.wide table {
	table-layout: auto;
	width: 100%;
	min-width: 700px;
	font-size: 15px;
	margin: 0;
	border-collapse: collapse;
}
article.wide table th {
	font-size: 14px;
	white-space: nowrap;
	position: sticky;
	top: 0;
	background: #fff;
}
article.wide table th a {
	color: inherit;
	text-decoration: none;
	border-bottom: 1px solid #ccc;
}
article.wide table th a:hover {
	border-bottom-color: #333;
}
article.wide table td {
	padding: 8px 10px;
	vertical-align: top;
	line-height: 1.35;
}
article.wide table td:first-child {
	font-weight: 600;
	white-space: nowrap;
}
article.wide table td.dim {
	opacity: 0.35;
	font-style: italic;
}
article.wide table td.blank {
	background: repeating-linear-gradient(
		-45deg,
		transparent,
		transparent 4px,
		rgba(0,0,0,0.03) 4px,
		rgba(0,0,0,0.03) 8px
	);
}
</style>

<script>
(function() {
	var popup = document.getElementById('rss-popup');
	var hasShown = false;
	var timeoutId = null;

	function isAtBottom() {
		return (window.innerHeight + window.scrollY) >= (document.body.offsetHeight - 100);
	}

	function showPopup() {
		if (!hasShown) {
			hasShown = true;
			popup.classList.add('visible');
		}
	}

	window.addEventListener('scroll', function() {
		if (isAtBottom() && !hasShown) {
			if (!timeoutId) {
				timeoutId = setTimeout(showPopup, 2000);
			}
		} else if (!isAtBottom() && timeoutId && !hasShown) {
			clearTimeout(timeoutId);
			timeoutId = null;
		}
	});
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>mermaid.initialize({startOnLoad:true});</script>
