<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family: 'SF Mono', 'Fira Code', monospace;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" rx="12" fill="url(#bg)"/>

  <!-- Frontend (top) -->
  <rect x="170" y="30" width="460" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="52" fill="#1e40af" font-size="11" font-weight="700" letter-spacing="1" text-anchor="middle">WEB FRONTEND</text>

  <rect x="195" y="65" width="180" height="32" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="285" y="86" fill="#1e40af" font-size="10" text-anchor="middle">filer surface</text>

  <rect x="425" y="65" width="180" height="32" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="515" y="86" fill="#1e40af" font-size="10" text-anchor="middle">reviewer surface</text>

  <!-- T-junction from frontend to pipelines -->
  <path d="M 400 110 L 400 145 M 200 145 L 600 145" stroke="#475569" stroke-width="1.5" fill="none"/>
  <line x1="200" y1="145" x2="200" y2="178" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="145" x2="600" y2="178" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sweep (left) -->
  <rect x="95" y="180" width="210" height="90" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1.5"/>
  <text x="200" y="208" fill="#15803d" font-size="13" font-weight="700" text-anchor="middle">SWEEP</text>
  <text x="200" y="230" fill="#475569" font-size="10" text-anchor="middle">contributor pipeline</text>
  <text x="200" y="250" fill="#475569" font-size="10" text-anchor="middle">issue → PR + receipts</text>

  <!-- Immune (right) -->
  <rect x="495" y="180" width="210" height="90" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="600" y="208" fill="#c2410c" font-size="13" font-weight="700" text-anchor="middle">IMMUNE</text>
  <text x="600" y="230" fill="#475569" font-size="10" text-anchor="middle">maintainer pipeline</text>
  <text x="600" y="250" fill="#475569" font-size="10" text-anchor="middle">PR → verdict + synthesis</text>

  <!-- Arrows down to GitHub -->
  <line x1="200" y1="270" x2="200" y2="305" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="270" x2="600" y2="305" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GitHub bus (bottom) -->
  <rect x="150" y="310" width="500" height="60" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="400" y="335" fill="#334155" font-size="12" font-weight="700" text-anchor="middle">GitHub</text>
  <text x="400" y="356" fill="#64748b" font-size="9" text-anchor="middle">issues · PRs · labels · comments · merge button (the only HITL gate)</text>
</svg>
