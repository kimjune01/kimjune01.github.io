<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" font-family="'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="none" stroke="#bbb" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="none" stroke="#4caf50" stroke-width="1.4" stroke-linejoin="round"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="none" stroke="#e53935" stroke-width="1.4" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Phase labels -->
  <text x="100" y="28" text-anchor="middle" font-size="10.5" font-weight="700" fill="#aaa" letter-spacing="0.12em">INVESTIGATE</text>
  <text x="300" y="28" text-anchor="middle" font-size="10.5" font-weight="700" fill="#aaa" letter-spacing="0.12em">PREWORK</text>
  <text x="500" y="28" text-anchor="middle" font-size="10.5" font-weight="700" fill="#aaa" letter-spacing="0.12em">BENCHMARK</text>
  <text x="690" y="28" text-anchor="middle" font-size="10.5" font-weight="700" fill="#aaa" letter-spacing="0.12em">BUG HUNT</text>
  <text x="880" y="28" text-anchor="middle" font-size="10.5" font-weight="700" fill="#aaa" letter-spacing="0.12em">SHIP</text>

  <!-- Phase dividers -->
  <line x1="200" y1="18" x2="200" y2="260" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="400" y1="18" x2="400" y2="260" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="595" y1="18" x2="595" y2="260" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="790" y1="18" x2="790" y2="260" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="4,4"/>

  <!-- INVESTIGATE -->
  <rect x="20" y="55" width="160" height="52" rx="10" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.2"/>
  <text x="100" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Hypothesis</text>
  <text x="100" y="95" text-anchor="middle" font-size="9.5" fill="#777">fan-out, classify, prune</text>

  <line x1="100" y1="107" x2="100" y2="122" stroke="#bbb" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="20" y="126" width="160" height="52" rx="10" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1.2"/>
  <text x="100" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Diagnosis</text>
  <text x="100" y="166" text-anchor="middle" font-size="9.5" fill="#777">surviving edges</text>

  <!-- PREWORK -->
  <rect x="220" y="55" width="160" height="52" rx="10" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.2"/>
  <text x="300" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Experiment repo</text>
  <text x="300" y="95" text-anchor="middle" font-size="9.5" fill="#777">reference, propose, compat</text>

  <line x1="300" y1="107" x2="300" y2="122" stroke="#bbb" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="220" y="126" width="160" height="52" rx="10" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1.2"/>
  <text x="300" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Derisk</text>
  <text x="300" y="166" text-anchor="middle" font-size="9.5" fill="#777">extract confirms bug</text>

  <!-- BENCHMARK -->
  <rect x="420" y="80" width="160" height="60" rx="10" fill="#fff8e1" stroke="#ffcc80" stroke-width="1.2"/>
  <text x="500" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Measure</text>
  <text x="500" y="124" text-anchor="middle" font-size="9.5" fill="#777">before and after</text>

  <!-- BUG HUNT -->
  <rect x="615" y="55" width="155" height="52" rx="10" fill="#f5f5f5" stroke="#ccc" stroke-width="1.2"/>
  <text x="692" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Codex</text>
  <text x="692" y="95" text-anchor="middle" font-size="9.5" fill="#777">structural</text>

  <line x1="692" y1="107" x2="692" y2="122" stroke="#bbb" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="615" y="126" width="155" height="52" rx="10" fill="#f5f5f5" stroke="#ccc" stroke-width="1.2"/>
  <text x="692" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Gemini</text>
  <text x="692" y="166" text-anchor="middle" font-size="9.5" fill="#777">logic tracing</text>

  <!-- SHIP -->
  <rect x="810" y="80" width="130" height="60" rx="10" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5"/>
  <text x="875" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">PR</text>
  <text x="875" y="124" text-anchor="middle" font-size="9.5" fill="#777">human gate</text>

  <!-- Forward arrows -->
  <line x1="180" y1="152" x2="216" y2="152" stroke="#bbb" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="380" y1="152" x2="418" y2="118" stroke="#bbb" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="580" y1="110" x2="611" y2="90" stroke="#bbb" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="770" y1="110" x2="806" y2="110" stroke="#4caf50" stroke-width="1.8" marker-end="url(#ag)"/>

  <!-- Converge label -->
  <text x="745" y="200" text-anchor="middle" font-size="9" fill="#4caf50" font-weight="500">zero new bugs</text>

  <!-- FEEDBACK: kill (Gemini bottom → Benchmark left) -->
  <path d="M615,152 L580,152 Q560,152 560,170 Q560,200 530,200 L510,200 Q490,200 490,180 L490,140" fill="none" stroke="#e53935" stroke-width="1.4" stroke-dasharray="6,4" marker-end="url(#ar)"/>
  <text x="555" y="216" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e53935">kill</text>

  <!-- FEEDBACK: oscillatory (Benchmark left → Hypothesis left) -->
  <path d="M420,110 L410,110 Q395,110 395,130 Q395,240 250,240 Q100,240 100,195 L100,178" fill="none" stroke="#e53935" stroke-width="1.4" stroke-dasharray="6,4" marker-end="url(#ar)"/>
  <text x="260" y="258" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e53935">oscillatory / split / re-enter</text>
</svg>
