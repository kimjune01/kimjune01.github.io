<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" style="font-family: 'SF Mono', 'Fira Code', monospace;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-retro" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="480" rx="12" fill="url(#bg)"/>

  <!-- Investigate group -->
  <rect x="380" y="55" width="350" height="245" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="78" fill="#475569" font-size="10" font-weight="600" letter-spacing="1.5">INVESTIGATE &amp; IMPLEMENT</text>

  <!-- SWEEP -->
  <rect x="70" y="145" width="130" height="75" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="135" y="175" fill="#3b82f6" font-size="13" font-weight="700" text-anchor="middle">SWEEP</text>
  <text x="135" y="195" fill="#475569" font-size="10" text-anchor="middle">Find candidates</text>

  <!-- TRIAGE -->
  <rect x="245" y="145" width="115" height="75" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="302" y="175" fill="#8b5cf6" font-size="13" font-weight="700" text-anchor="middle">TRIAGE</text>
  <text x="302" y="195" fill="#475569" font-size="10" text-anchor="middle">Score &amp; kill</text>

  <!-- Agents -->
  <rect x="410" y="100" width="80" height="36" rx="6" fill="#f1f5f9" stroke="#334155" stroke-width="1"/>
  <text x="450" y="123" fill="#334155" font-size="11" text-anchor="middle">Agent A</text>

  <rect x="410" y="165" width="80" height="36" rx="6" fill="#f1f5f9" stroke="#334155" stroke-width="1"/>
  <text x="450" y="188" fill="#334155" font-size="11" text-anchor="middle">Agent B</text>

  <rect x="410" y="230" width="80" height="36" rx="6" fill="#f1f5f9" stroke="#334155" stroke-width="1"/>
  <text x="450" y="253" fill="#334155" font-size="11" text-anchor="middle">Agent C</text>

  <!-- Hypothesis Graph -->
  <rect x="540" y="85" width="170" height="200" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="625" y="108" fill="#10b981" font-size="11" font-weight="700" text-anchor="middle">HYPOTHESIS GRAPH</text>

  <!-- Graph nodes and edges -->
  <circle cx="580" cy="155" r="5" fill="#10b981" opacity="0.8"/>
  <circle cx="625" cy="140" r="5" fill="#10b981" opacity="0.8"/>
  <circle cx="625" cy="200" r="5" fill="#10b981" opacity="0.8"/>
  <circle cx="670" cy="180" r="5" fill="#10b981" opacity="0.8"/>
  <circle cx="650" cy="240" r="5" fill="#10b981" opacity="0.8"/>
  <circle cx="595" cy="220" r="4" fill="#10b981" opacity="0.5"/>
  <path d="M 580 155 L 625 140 M 580 155 L 625 200 M 625 140 L 670 180 M 625 200 L 670 180 M 625 200 L 650 240 M 595 220 L 625 200 M 595 220 L 650 240" stroke="#10b981" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- LINEUP GATE -->
  <rect x="770" y="130" width="125" height="105" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="832" y="160" fill="#f59e0b" font-size="12" font-weight="700" text-anchor="middle">LINEUP</text>
  <text x="832" y="180" fill="#475569" font-size="10" text-anchor="middle">Adversarial</text>
  <text x="832" y="195" fill="#475569" font-size="10" text-anchor="middle">voice check</text>
  <text x="832" y="218" fill="#475569" font-size="9" text-anchor="middle">AI vs real PRs</text>

  <!-- DRIP -->
  <rect x="935" y="145" width="105" height="75" rx="8" fill="#f1f5f9" stroke="#ef4444" stroke-width="1.5"/>
  <text x="987" y="175" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">DRIP</text>
  <text x="987" y="195" fill="#475569" font-size="10" text-anchor="middle">1 PR / repo</text>

  <!-- Main flow arrows -->
  <line x1="200" y1="182" x2="238" y2="182" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <path d="M 360 182 L 388 182 M 388 118 L 388 248" stroke="#475569" stroke-width="1.5" fill="none"/>
  <line x1="388" y1="118" x2="404" y2="118" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="388" y1="183" x2="404" y2="183" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="388" y1="248" x2="404" y2="248" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="490" y1="118" x2="534" y2="118" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="490" y1="183" x2="534" y2="183" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="490" y1="248" x2="534" y2="248" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <line x1="710" y1="182" x2="764" y2="182" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="895" y1="182" x2="929" y2="182" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Log lines (subtle) -->
  <line x1="135" y1="330" x2="987" y2="330" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>

  <line x1="135" y1="220" x2="135" y2="325" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="302" y1="220" x2="302" y2="325" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="450" y1="266" x2="450" y2="325" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="625" y1="285" x2="625" y2="325" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="832" y1="235" x2="832" y2="325" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="987" y1="220" x2="987" y2="325" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ALL LOGS down arrow -->
  <line x1="560" y1="330" x2="560" y2="375" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="590" y="360" fill="#334155" font-size="9">ALL LOGS</text>

  <!-- RETRO -->
  <rect x="430" y="380" width="260" height="60" rx="10" fill="#f1f5f9" stroke="#f59e0b" stroke-width="2"/>
  <text x="560" y="405" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">RETRO</text>
  <text x="560" y="425" fill="#475569" font-size="10" text-anchor="middle">Compress lessons back to pipeline</text>

  <!-- Retro feedback loop -->
  <path d="M 1040 182 L 1065 182 L 1065 410 L 698 410" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arrow-retro)"/>
  <path d="M 430 410 L 45 410 L 45 182 L 62 182" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arrow-retro)"/>

  <text x="850" y="408" fill="#f59e0b" font-size="9" text-anchor="middle">trigger retro</text>
  <text x="240" y="408" fill="#f59e0b" font-size="9" text-anchor="middle">lessons update skills</text>
</svg>
 